[workspace]
authors = ["Shamistan Karimov <ahresgg@gmail.com>"]
channels = ["conda-forge"]
name = "OmniLRS"
platforms = ["linux-64"]
version = "0.1.0"
description = "Pixi environments for OmniLRS with Isaac Sim 5 and manager-specific features"

[system-requirements]
libc = { family = "glibc", version = "2.35" }

[dependencies]
python = "3.11.*"
packaging = "==23.0"
numpy = "==1.26.0"
gdal = "*"
libgdal = "*"

[pypi-options]
index-url = "https://pypi.org/simple"
extra-index-urls = ["https://pypi.nvidia.com"]
index-strategy = "unsafe-best-match"

[pypi-dependencies]
isaacsim = { version = "==5.0.0", extras = ["all", "extscache"] }
opencv-python = "*"
omegaconf = "*"
hydra-core = "*"
skyfield = "*"
zfpy = "*"
numba = "*"
gdown = "*"
em = "*"
lark = "*"
pandas = "*"
OmniLRS = { path = ".", editable = true }

[feature.yamcs.pypi-dependencies]
yamcs-client = "*"

[activation.env]
OMNI_KIT_ACCEPT_EULA = "YES"
OMNILRS_ROOT = "."

[tasks]
python-test = "python -c \"import isaacsim; print('isaacsim import ok')\""
isaacsim = "isaacsim"

[feature.yamcs.tasks]
yamcs = "python run.py mode=Yamcs environment=lunaryard_40m_workshop"

[environments]
default = { solve-group = "default" }
yamcs = { features = ["yamcs"], solve-group = "default" }
