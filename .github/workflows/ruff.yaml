name: Lint

on: [push, pull_request]

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Ruff is a standalone static analyzer: it needs none of the project's
      # dependencies. Pin the version so CI, pre-commit and local dev agree.
      - name: Ruff lint
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          version: "0.15.19"
          args: "check --output-format=github"

      - name: Ruff format check
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          version: "0.15.19"
          args: "format --check"
